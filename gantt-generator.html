<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガントチャート ジェネレーター</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;font-size:14px;color:#111827;background:#F3F4F6;height:100vh;display:flex;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:420px;min-width:420px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sb-head{padding:16px 16px 0;border-bottom:1px solid #E5E7EB}
.sb-head h1{font-size:.95rem;font-weight:700;color:#111827;margin-bottom:12px}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 11px;font-size:.75rem;font-weight:600;color:#6B7280;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn.active{color:#3B82F6;border-bottom-color:#3B82F6}
.sb-body{flex:1;overflow-y:auto;padding:14px}
.sb-foot{padding:10px 14px;border-top:1px solid #E5E7EB;background:#F9FAFB;display:flex;flex-wrap:wrap;gap:6px}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── Preview ── */
#preview{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
#export-area{display:flex;flex-direction:column;gap:14px;background:#F3F4F6;padding:0}

/* ── Forms ── */
.fg{margin-bottom:12px}
.fg label,.fg-label{display:block;font-size:.72rem;font-weight:700;color:#374151;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fg input[type=text],.fg input[type=date],.fg input[type=number],.fg select,.fg textarea{width:100%;padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:.84rem;font-family:inherit;color:#111827;background:#fff;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#3B82F6;box-shadow:0 0 0 2px #DBEAFE}
.fr{display:flex;gap:8px}.fr .fg{flex:1;margin-bottom:0}
.sec-title{font-size:.69rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9CA3AF;margin:16px 0 10px;display:flex;align-items:center;justify-content:space-between}
.sec-title:first-child{margin-top:0}
.divider{border:none;border-top:1px solid #E5E7EB;margin:14px 0}
.radio-grp{display:flex;gap:14px;flex-wrap:wrap}
.radio-item,.chk-item{display:flex;align-items:center;gap:5px;font-size:.84rem;color:#374151}
.person-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}

/* ── Buttons ── */
.btn{padding:7px 13px;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:background .15s;white-space:nowrap}
.btn-primary{background:#3B82F6;color:#fff}.btn-primary:hover{background:#2563EB}
.btn-secondary{background:#F3F4F6;color:#374151;border:1px solid #E5E7EB}.btn-secondary:hover{background:#E5E7EB}
.btn-danger{background:none;color:#EF4444;border:1px solid #FECACA;padding:3px 8px;font-size:.75rem}.btn-danger:hover{background:#FEF2F2}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── List items (collapsible) ── */
.li-wrap{border:1px solid #E5E7EB;border-radius:8px;margin-bottom:7px;overflow:hidden}
.li-head{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#F9FAFB;cursor:pointer;user-select:none}
.li-head:hover{background:#F3F4F6}
.li-name{flex:1;font-weight:600;font-size:.84rem;color:#111827}
.li-sub{color:#9CA3AF;font-weight:400;font-size:.75rem;margin-left:4px}
.li-body{padding:12px;border-top:1px solid #E5E7EB;background:#fff;display:none}
.li-body.open{display:block}

/* ── Phase form ── */
.phase-wrap{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:9px;margin-bottom:7px}
.phase-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}

/* ── Holiday tags ── */
.h-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;min-height:24px}
.h-tag{display:inline-flex;align-items:center;gap:3px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:100px;padding:2px 8px;font-size:.72rem;color:#1D4ED8}
.h-tag.company{background:#F0FDF4;border-color:#BBF7D0;color:#166534}
.h-tag button{background:none;border:none;cursor:pointer;color:#93C5FD;font-size:.9rem;line-height:1;padding:0}.h-tag button:hover{color:#EF4444}

/* ── Color swatch ── */
.swatch{width:22px;height:22px;border-radius:4px;border:1px solid rgba(0,0,0,.1);flex-shrink:0;display:inline-block}

/* ── Gantt card ── */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);padding:18px 22px}
.card-header{font-size:.69rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9CA3AF;margin-bottom:14px}
.chart-scroll{overflow-x:auto}
svg{display:block}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid #F3F4F6}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#374151}
.legend-sw{width:13px;height:13px;border-radius:3px;flex-shrink:0}

/* ── Summary table ── */
table{width:100%;border-collapse:collapse}
thead th{background:#F9FAFB;padding:9px 13px;text-align:left;font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#6B7280;border-bottom:2px solid #E5E7EB}
tbody td{padding:8px 13px;border-bottom:1px solid #F3F4F6;font-size:.83rem}
tbody tr:last-child td{border-bottom:none}
tbody tr.irow td{background:#F9FAFB;font-weight:700;font-size:.8rem;color:#374151}
tbody tr.erow td{background:#FAF5FF}
.badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:.72rem;font-weight:700;white-space:nowrap}

/* ── Warn / Hint ── */
.warn-box{display:flex;align-items:flex-start;gap:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:11px 15px;font-size:.82rem;color:#991B1B;line-height:1.7}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-head">
    <h1>ガントチャート ジェネレーター</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="phtypes">工程タイプ</button>
      <button class="tab-btn" data-tab="items">アイテム</button>
      <button class="tab-btn" data-tab="people">担当者</button>
      <button class="tab-btn" data-tab="project">プロジェクト設定</button>
    </div>
  </div>

  <div class="sb-body">

    <!-- ▸ PHASE TYPES -->
    <div class="tab-pane active" id="tab-phtypes">
      <div class="sec-title">
        <span>工程タイプ</span>
        <button class="btn btn-secondary btn-sm" id="btn-add-pt">＋ 追加</button>
      </div>
      <div id="pt-list"></div>
    </div>

    <!-- ▸ ITEMS -->
    <div class="tab-pane" id="tab-items">
      <div class="sec-title">
        <span>開発アイテム</span>
        <button class="btn btn-primary btn-sm" id="btn-add-item">＋ 追加</button>
      </div>
      <div id="items-list"></div>
    </div>

    <!-- ▸ PEOPLE -->
    <div class="tab-pane" id="tab-people">
      <div class="sec-title">
        <span>担当者</span>
        <button class="btn btn-secondary btn-sm" id="btn-add-person">＋ 追加</button>
      </div>
      <div id="people-list"></div>
    </div>

    <!-- ▸ PROJECT + HOLIDAYS -->
    <div class="tab-pane" id="tab-project">
      <div class="fg"><label>プロジェクト名</label><input type="text" id="f-name"></div>
      <div class="fr">
        <div class="fg"><label>開始日</label><input type="date" id="f-start"></div>
        <div class="fg"><label>リリース日</label><input type="date" id="f-release"></div>
      </div>
      <div class="fg">
        <label>リリース評価期間</label>
        <div class="fr" style="gap:6px">
          <input type="number" id="f-eval-val" min="1" max="999" style="flex:1;padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:.84rem">
          <select id="f-eval-unit" style="flex:1.2;padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:.84rem">
            <option value="days">日</option>
            <option value="weeks">週</option>
            <option value="months">ヶ月</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>ガントチャート表示単位</label>
        <div class="radio-grp">
          <label class="radio-item"><input type="radio" name="ganttUnit" value="days"> 日</label>
          <label class="radio-item"><input type="radio" name="ganttUnit" value="weeks"> 週</label>
          <label class="radio-item"><input type="radio" name="ganttUnit" value="months"> 月</label>
        </div>
      </div>

      <hr class="divider">

      <div class="sec-title">
        <span>祝日（国民の祝日）</span>
        <button class="btn btn-primary btn-sm" id="btn-fetch">自動取得</button>
      </div>
      <p style="font-size:.75rem;color:#6B7280;margin-bottom:8px">バンドル済み（2024〜2028年）。ネット接続時は「自動取得」で最新データに更新できます。</p>
      <div class="fr" style="gap:6px">
        <input type="date" id="f-nat-date" style="flex:1;padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:.84rem">
        <button class="btn btn-secondary btn-sm" id="btn-add-nat">追加</button>
      </div>
      <div class="h-tags" id="nat-tags"></div>

      <hr class="divider">

      <div class="sec-title"><span>会社指定休業日</span></div>
      <p style="font-size:.75rem;color:#6B7280;margin-bottom:8px">年末年始・創立記念日など会社固有の休業日を追加してください。</p>
      <div class="fr" style="gap:6px">
        <input type="date" id="f-com-date" style="flex:1;padding:7px 9px;border:1px solid #D1D5DB;border-radius:6px;font-size:.84rem">
        <button class="btn btn-secondary btn-sm" id="btn-add-com">追加</button>
      </div>
      <div class="h-tags" id="com-tags"></div>
    </div>

  </div><!-- /sb-body -->

  <div class="sb-foot">
    <button class="btn btn-primary" id="btn-html">HTML 出力</button>
    <button class="btn btn-secondary" id="btn-png">PNG 出力</button>
    <button class="btn btn-secondary" id="btn-json-save">JSON 保存</button>
    <label class="btn btn-secondary" style="cursor:pointer">JSON 読込<input type="file" id="f-json-load" accept=".json" style="display:none"></label>
  </div>
</aside>

<main id="preview">
  <div>
    <div id="pv-title" style="font-size:1.4rem;font-weight:700;color:#111827;margin-bottom:3px"></div>
    <div id="pv-sub" style="font-size:.84rem;color:#6B7280"></div>
  </div>
  <div id="warn-box"></div>
  <div id="export-area">
    <div class="card" id="gantt-card">
      <div class="card-header">ガントチャート</div>
      <div class="chart-scroll"><svg id="gantt"></svg></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="card">
      <div class="card-header">スケジュールサマリー</div>
      <table>
        <thead><tr><th>アイテム / 工程</th><th>担当者</th><th>開始日</th><th>終了日</th><th>営業日数</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  BUNDLED HOLIDAYS (Japan 2024-2028)
// ═══════════════════════════════════════════════════════════
const BUNDLED = [
  '2024-01-01','2024-01-08','2024-02-11','2024-02-12','2024-02-23','2024-03-20',
  '2024-04-29','2024-05-03','2024-05-04','2024-05-05','2024-05-06','2024-07-15',
  '2024-08-11','2024-08-12','2024-09-16','2024-09-22','2024-09-23','2024-10-14',
  '2024-11-03','2024-11-04','2024-11-23',
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20',
  '2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21',
  '2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03',
  '2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29',
  '2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11',
  '2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21','2027-03-22',
  '2027-04-29','2027-05-03','2027-05-04','2027-05-05','2027-07-19','2027-08-11',
  '2027-09-20','2027-09-21','2027-09-23','2027-10-11','2027-11-03','2027-11-23',
  '2028-01-01','2028-01-10','2028-02-11','2028-02-23','2028-03-20','2028-04-29',
  '2028-05-03','2028-05-04','2028-05-05','2028-05-06','2028-07-17','2028-08-11',
  '2028-09-18','2028-09-22','2028-10-09','2028-11-03','2028-11-23',
];

// ═══════════════════════════════════════════════════════════
//  DEFAULT CONFIG
// ═══════════════════════════════════════════════════════════
const DEFAULT_CONFIG = {
  projectName: '新規プロジェクト',
  startDate:   '2026-04-20',
  releaseDate: '2026-07-15',
  evalPeriod:  { value: 4, unit: 'weeks' },
  ganttUnit:   'weeks',
  holidays: {
    national: [...BUNDLED],
    company:  [],
  },
  phaseTypes: [
    { name: '要件定義',       team: 'D&T', color: '#3B82F6' },
    { name: 'テストケース作成', team: 'D&T', color: '#F59E0B' },
    { name: '設計開発',       team: 'SI',  color: '#10B981' },
    { name: 'ハードウェア調達', team: 'SI',  color: '#EC4899' },
  ],
  people: [
    { name: '担当者A', team: 'チーム1', phases: ['要件定義','テストケース作成'], availableFrom: null, utilization: 1.0, note: '' },
    { name: '担当者B', team: 'チーム2', phases: ['設計開発'], availableFrom: null, utilization: 1.0, note: '' },
  ],
  items: [
    {
      name: 'サンプルタスク', category: '開発', note: '',
      phases: [
        { type: '要件定義', days: 5 },
        { type: '設計開発', days: 10 },
      ],
    },
  ],
  evalPhase: { name: 'リリース評価', color: '#8B5CF6' },
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let C = loadConfig();

function loadConfig() {
  try {
    const s = localStorage.getItem('gantt-gen-cfg');
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
}
function saveConfig() {
  try { localStorage.setItem('gantt-gen-cfg', JSON.stringify(C)); } catch {}
}

// ═══════════════════════════════════════════════════════════
//  DATE UTILITIES
// ═══════════════════════════════════════════════════════════
const parse  = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const fmt    = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const p2     = n => String(n).padStart(2,'0');
const DOW    = ['日','月','火','水','木','金','土'];
const fmtJP  = d => `${d.getMonth()+1}/${d.getDate()}（${DOW[d.getDay()]}）`;
const fmtS   = d => `${d.getMonth()+1}/${d.getDate()}`;
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };

function getHolSet() {
  const s = new Set(C.holidays.national);
  C.holidays.company.forEach(d => s.add(d));
  return s;
}
function isBiz(d, hols) { const w=d.getDay(); return w!==0&&w!==6&&!hols.has(fmt(d)); }
function countBiz(s,e,hols) { let n=0,d=new Date(s); while(d<=e){if(isBiz(d,hols))n++;d=addDays(d,1);} return n; }
function subtractBiz(end,n,hols) { let d=new Date(end),c=0; while(c<n){if(isBiz(d,hols))c++;if(c<n)d=addDays(d,-1);} return d; }

function evalToBusinessDays(period, hols) {
  const { value, unit } = period;
  if (unit === 'days')  return value;
  if (unit === 'weeks') return value * 5;
  // months: count biz days in `value` calendar months before release
  const rel   = parse(C.releaseDate);
  const start = new Date(rel.getFullYear(), rel.getMonth() - value, rel.getDate());
  return countBiz(start, rel, hols);
}

function getMondayOf(d) {
  const r = new Date(d);
  const dow = r.getDay();
  r.setDate(r.getDate() - (dow === 0 ? 6 : dow - 1));
  return r;
}

// ═══════════════════════════════════════════════════════════
//  SCHEDULER  (adapted from gantt.html)
// ═══════════════════════════════════════════════════════════
function runSchedule() {
  const hols     = getHolSet();
  const _start   = parse(C.startDate);
  const _release = parse(C.releaseDate);
  const evalBD   = evalToBusinessDays(C.evalPeriod, hols);
  const evalStart = subtractBiz(_release, evalBD, hols);

  const tasks = [];
  C.items.forEach((item, iIdx) => {
    let remaining = item.phases.reduce((s,p) => s+p.days, 0);
    item.phases.forEach((phase, pIdx) => {
      tasks.push({
        id:           `${iIdx}-${pIdx}`,
        itemIdx:      iIdx,
        itemName:     item.name,
        category:     item.category || '',
        phaseType:    phase.type,
        totalDays:    phase.days,
        phaseIdx:     pIdx,
        predId:       pIdx > 0 ? `${iIdx}-${pIdx-1}` : null,
        priority:     remaining,
        isBackground: !!phase.background,
        isFixed:      !!phase.fixedStart,
        fixedStartDate: phase.fixedStart ? parse(phase.fixedStart) : null,
        allowedPeople:  phase.allowedPeople || null,
        requireAll:     !!phase.requireAll,
        status:       'waiting',
        startDate:    null,
        endDate:      null,
        daysWorked:   0,
        assignedPeople: [],
        hasConflict:  false,
      });
      remaining -= phase.days;
    });
  });

  const taskMap = {};
  tasks.forEach(t => taskMap[t.id] = t);

  const personBusy = {};
  C.people.forEach(p => personBusy[p.name] = 0);

  function pickPeople(task, d) {
    const phase = C.items[task.itemIdx].phases[task.phaseIdx];
    const allowed = phase.allowedPeople ? new Set(phase.allowedPeople) : null;

    const eligible = C.people.filter(p =>
      p.phases.includes(task.phaseType) &&
      (!p.availableFrom || parse(p.availableFrom) <= d) &&
      (!allowed || allowed.has(p.name)) &&
      personBusy[p.name] === 0
    );

    if (phase.requireAll && phase.allowedPeople) {
      const allFree = phase.allowedPeople.every(name => {
        const p = C.people.find(x => x.name === name);
        return p && personBusy[name] === 0 && (!p.availableFrom || parse(p.availableFrom) <= d);
      });
      return allFree ? phase.allowedPeople : null;
    }
    return eligible.length > 0 ? [eligible[0].name] : null;
  }

  let d = new Date(_start);
  const limit = addDays(_release, 365);

  while (d <= limit) {
    if (!isBiz(d, hols)) { d = addDays(d,1); continue; }

    // 固定開始日タスクを強制開始
    for (const t of tasks) {
      if (t.isFixed && t.status === 'waiting' && +t.fixedStartDate === +d) {
        const assigned = pickPeople(t, d);
        t.status = 'inProgress'; t.startDate = new Date(d);
        if (assigned) { t.assignedPeople = assigned; assigned.forEach(n => personBusy[n]++); }
        else {
          const phase = C.items[t.itemIdx].phases[t.phaseIdx];
          const fb = phase.allowedPeople ? phase.allowedPeople[0] : null;
          t.assignedPeople = fb ? [fb + '(要調整)'] : [];
          t.hasConflict = true;
        }
      }
    }

    // 先行完了 → ready
    for (const t of tasks) {
      if (t.status === 'waiting' && !t.isFixed) {
        const pred = t.predId ? taskMap[t.predId] : null;
        if (!pred || pred.status === 'complete') t.status = 'ready';
      }
    }

    // ready タスクを優先度順に着手
    const ready = tasks
      .filter(t => t.status === 'ready')
      .sort((a,b) => b.priority - a.priority || a.itemIdx - b.itemIdx || a.phaseIdx - b.phaseIdx);

    for (const t of ready) {
      if (t.isBackground) {
        t.status = 'inProgress'; t.startDate = new Date(d); t.assignedPeople = [];
      } else {
        const assigned = pickPeople(t, d);
        if (assigned) {
          t.status = 'inProgress'; t.startDate = new Date(d);
          t.assignedPeople = assigned;
          assigned.forEach(n => personBusy[n]++);
        }
      }
    }

    // 作業実行 & 完了判定
    for (const t of tasks) {
      if (t.status === 'inProgress') {
        t.daysWorked++;
        if (t.daysWorked >= t.totalDays) {
          t.status = 'complete'; t.endDate = new Date(d);
          if (!t.isBackground) t.assignedPeople.forEach(n => { if (n in personBusy) personBusy[n]--; });
        }
      }
    }

    if (tasks.every(t => t.status === 'complete')) break;
    d = addDays(d, 1);
  }

  // 警告収集
  const warnings = [];
  tasks.forEach(t => {
    if (t.endDate && t.endDate >= evalStart && !t.isBackground)
      warnings.push(`「${t.itemName} / ${t.phaseType}」がリリース評価開始（${fmtJP(evalStart)}）を超過しています。`);
    if (!t.startDate && t.status !== 'complete')
      warnings.push(`「${t.itemName} / ${t.phaseType}」を担当できる人が見つかりませんでした。`);
    if (t.hasConflict)
      warnings.push(`「${t.itemName} / ${t.phaseType}」でリソース競合が発生しました。`);
  });

  return { tasks, evalStart, evalEnd: _release, warnings, hols };
}

// ═══════════════════════════════════════════════════════════
//  SVG GANTT RENDERER
// ═══════════════════════════════════════════════════════════
const LW=220, ROW_H=30, HDR_H=48, PAD=8;
const COL_W = { days: 22, weeks: 68, months: 110 };

function dateToX(date, vStart, unit) {
  const ms = date - vStart;
  const days = ms / 86400000;
  if (unit === 'days')   return days * COL_W.days;
  if (unit === 'weeks')  return (days / 7) * COL_W.weeks;
  return (days / 30.4375) * COL_W.months; // approximate month
}

function buildColHeaders(vStart, vEnd, unit) {
  const cols = [];
  if (unit === 'days') {
    let d = new Date(vStart);
    while (d <= vEnd) { cols.push(new Date(d)); d = addDays(d,1); }
  } else if (unit === 'weeks') {
    let d = getMondayOf(vStart);
    while (d <= vEnd) { cols.push(new Date(d)); d = addDays(d,7); }
  } else {
    let d = new Date(vStart.getFullYear(), vStart.getMonth(), 1);
    while (d <= addDays(vEnd, 31)) {
      cols.push(new Date(d));
      d = new Date(d.getFullYear(), d.getMonth()+1, 1);
      if (d > addDays(vEnd, 60)) break;
    }
  }
  return cols;
}

function renderGantt(scheduled) {
  const { tasks, evalStart, evalEnd, hols } = scheduled;
  const unit   = C.ganttUnit || 'weeks';
  const colW   = COL_W[unit];
  const _start = parse(C.startDate);

  // View range
  const dow0  = _start.getDay();
  const vStart = addDays(_start, -(dow0===0?6:dow0-1)); // snap to Monday
  const relDow = evalEnd.getDay();
  const vEnd   = addDays(evalEnd, relDow===0?0:7-relDow+7);

  const totalW = LW + dateToX(vEnd, vStart, unit);

  // Row layout: group by item
  const rows = []; // { task | 'itemHeader' }
  let prevItemIdx = -1;
  tasks.forEach(t => {
    if (t.itemIdx !== prevItemIdx) { rows.push({ kind:'hdr', item: C.items[t.itemIdx], iIdx: t.itemIdx }); prevItemIdx = t.itemIdx; }
    rows.push({ kind:'task', task: t });
  });

  const bodyH = rows.length * ROW_H + PAD;
  const evalRowY = HDR_H + bodyH;
  const totalH = evalRowY + ROW_H + PAD;

  const phaseColor = {};
  C.phaseTypes.forEach(pt => phaseColor[pt.name] = pt.color);

  let g = '';

  // ── Background zones ──
  const cols = buildColHeaders(vStart, vEnd, unit);
  cols.forEach((col, i) => {
    const x = LW + dateToX(col, vStart, unit);
    const w = i+1 < cols.length ? dateToX(cols[i+1], vStart, unit) - dateToX(col, vStart, unit) : colW;
    // weekend / holiday shade for day unit
    if (unit === 'days') {
      const dow = col.getDay();
      const isHol = hols.has(fmt(col));
      if (isHol && dow !== 0 && dow !== 6)
        g += `<rect x="${x}" y="0" width="${w}" height="${totalH}" fill="#FEF3C7" opacity=".5"/>`;
      else if (dow === 0 || dow === 6)
        g += `<rect x="${x}" y="0" width="${w}" height="${totalH}" fill="#F9FAFB" opacity=".7"/>`;
    } else {
      if (i%2===0) g += `<rect x="${x}" y="${HDR_H}" width="${w}" height="${bodyH}" fill="#F9FAFB" opacity=".6"/>`;
    }
  });

  // ── Eval zone ──
  const evalX1 = LW + dateToX(evalStart, vStart, unit);
  const evalX2 = LW + dateToX(evalEnd, vStart, unit);
  g += `<rect x="${evalX1}" y="0" width="${evalX2-evalX1}" height="${totalH}" fill="#8B5CF6" opacity=".06"/>`;
  g += `<line x1="${evalX1}" y1="0" x2="${evalX1}" y2="${totalH}" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>`;
  g += `<text x="${evalX1+4}" y="14" fill="#7C3AED" font-size="9.5" font-weight="700" font-family="sans-serif">${esc(C.evalPhase.name)}</text>`;

  // ── Column grid lines & header labels ──
  g += `<rect x="0" y="22" width="${totalW}" height="${HDR_H-22}" fill="#F3F4F6"/>`;
  g += `<text x="10" y="38" fill="#374151" font-size="11" font-weight="700" font-family="sans-serif">アイテム / 工程</text>`;

  let prevMonth = -1, prevYear = -1;
  cols.forEach((col, i) => {
    const x = LW + dateToX(col, vStart, unit);
    const w = i+1 < cols.length ? dateToX(cols[i+1], vStart, unit) - dateToX(col, vStart, unit) : colW;

    // Top label (month / year changes)
    if (unit === 'days') {
      const m = col.getMonth();
      if (m !== prevMonth) {
        g += `<text x="${x+2}" y="14" fill="#6B7280" font-size="10" font-weight="700" font-family="sans-serif">${col.getFullYear()}/${m+1}</text>`;
        prevMonth = m;
      }
    } else if (unit === 'weeks') {
      const m = col.getMonth();
      if (m !== prevMonth) {
        g += `<text x="${x+2}" y="14" fill="#6B7280" font-size="10" font-weight="700" font-family="sans-serif">${col.getFullYear()}/${m+1}</text>`;
        prevMonth = m;
      }
    } else {
      const y = col.getFullYear();
      if (y !== prevYear) {
        g += `<text x="${x+2}" y="14" fill="#6B7280" font-size="10" font-weight="700" font-family="sans-serif">${y}年</text>`;
        prevYear = y;
      }
    }

    // Grid line
    g += `<line x1="${x}" y1="22" x2="${x}" y2="${totalH}" stroke="#E5E7EB" stroke-width=".5"/>`;

    // Bottom header label
    let lbl = '';
    if (unit === 'days')   lbl = `${col.getDate()}`;
    else if (unit==='weeks') lbl = fmtS(col);
    else lbl = `${col.getMonth()+1}月`;
    if (w >= 18) g += `<text x="${x+w/2}" y="38" text-anchor="middle" fill="#6B7280" font-size="${unit==='days'?9:10}" font-family="sans-serif">${lbl}</text>`;
  });

  // Header bottom border
  g += `<line x1="0" y1="${HDR_H}" x2="${totalW}" y2="${HDR_H}" stroke="#E5E7EB" stroke-width="1"/>`;
  g += `<line x1="${LW}" y1="0" x2="${LW}" y2="${totalH}" stroke="#D1D5DB" stroke-width="1"/>`;

  // ── Rows ──
  rows.forEach((row, ri) => {
    const ry = HDR_H + ri * ROW_H;
    if (ri % 2 === 0) g += `<rect x="0" y="${ry}" width="${LW}" height="${ROW_H}" fill="#FAFAFA"/>`;

    if (row.kind === 'hdr') {
      // Item header row (label only, no bar)
      g += `<text x="8" y="${ry+ROW_H/2+4}" fill="#374151" font-size="10.5" font-weight="700" font-family="sans-serif">${esc(trunc(row.item.name,26))}</text>`;
      if (row.item.category) g += `<rect x="${LW-75}" y="${ry+6}" width="70" height="16" rx="8" fill="#F3F4F6"/>
        <text x="${LW-40}" y="${ry+17}" text-anchor="middle" fill="#6B7280" font-size="9" font-family="sans-serif">${esc(trunc(row.item.category,10))}</text>`;
      g += `<line x1="0" y1="${ry}" x2="${totalW}" y2="${ry}" stroke="#E5E7EB" stroke-width=".8"/>`;
    } else {
      const { task: t } = row;
      g += `<text x="18" y="${ry+ROW_H/2+4}" fill="#9CA3AF" font-size="9.5" font-family="sans-serif">└ ${esc(t.phaseType)}</text>`;

      if (t.startDate && t.endDate) {
        const bx = LW + dateToX(t.startDate, vStart, unit);
        const ex = LW + dateToX(addDays(t.endDate,1), vStart, unit);
        const bw = Math.max(ex-bx, 3);
        const by = ry+4, bh = ROW_H-8;
        const col = t.isBackground ? '#D1D5DB' : (phaseColor[t.phaseType] || '#6B7280');
        if (t.isBackground) {
          g += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="3" fill="none" stroke="${col}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
          g += `<text x="${bx+4}" y="${by+bh/2+3.5}" fill="#9CA3AF" font-size="8.5" font-family="sans-serif">BG</text>`;
        } else {
          g += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="3" fill="${col}" opacity=".82"/>`;
          if (bw > 24 && t.assignedPeople.length > 0)
            g += `<text x="${bx+5}" y="${by+bh/2+3.5}" fill="#fff" font-size="8.5" font-weight="600" font-family="sans-serif">${esc(t.assignedPeople.join(','))}</text>`;
        }
        if (t.hasConflict) g += `<text x="${bx+bw+3}" y="${by+bh/2+4}" fill="#EF4444" font-size="9" font-family="sans-serif">⚠</text>`;
      } else {
        g += `<text x="140" y="${ry+ROW_H/2+4}" fill="#EF4444" font-size="9" font-family="sans-serif">未スケジュール</text>`;
      }
    }
  });

  // ── Eval bar ──
  g += `<line x1="0" y1="${evalRowY}" x2="${totalW}" y2="${evalRowY}" stroke="#E5E7EB" stroke-width="1"/>`;
  g += `<text x="10" y="${evalRowY+ROW_H/2+4}" fill="#7C3AED" font-size="10" font-weight="700" font-family="sans-serif">${esc(C.evalPhase.name)}</text>`;
  const ebx = LW + dateToX(evalStart, vStart, unit);
  const ebw = Math.max(dateToX(evalEnd, vStart, unit) - dateToX(evalStart, vStart, unit), 4);
  g += `<rect x="${ebx}" y="${evalRowY+4}" width="${ebw}" height="${ROW_H-8}" rx="3" fill="${C.evalPhase.color}" opacity=".8"/>`;

  // ── Today line ──
  const today = new Date();
  if (today >= vStart && today <= vEnd) {
    const tx = LW + dateToX(today, vStart, unit);
    g += `<line x1="${tx}" y1="${HDR_H}" x2="${tx}" y2="${totalH}" stroke="#EF4444" stroke-width="1.5" opacity=".55"/>`;
    g += `<text x="${tx+2}" y="${HDR_H+11}" fill="#EF4444" font-size="9" font-family="sans-serif">今日</text>`;
  }

  // White bg for label area
  g = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>` + g;
  // Freeze label column visually
  g += `<rect x="0" y="${HDR_H}" width="${LW}" height="${bodyH+ROW_H+PAD}" fill="rgba(255,255,255,0)"/>`;

  const svg = document.getElementById('gantt');
  svg.setAttribute('width',  Math.ceil(totalW));
  svg.setAttribute('height', Math.ceil(totalH));
  svg.setAttribute('viewBox',`0 0 ${Math.ceil(totalW)} ${Math.ceil(totalH)}`);
  svg.innerHTML = g;

  // Legend
  let leg = '';
  C.phaseTypes.forEach(pt => {
    leg += `<div class="legend-item"><div class="legend-sw" style="background:${pt.color}"></div>${esc(pt.name)}</div>`;
  });
  leg += `<div class="legend-item"><div class="legend-sw" style="background:${C.evalPhase.color}"></div>${esc(C.evalPhase.name)}</div>`;
  document.getElementById('legend').innerHTML = leg;
}

// ═══════════════════════════════════════════════════════════
//  TABLE RENDERER
// ═══════════════════════════════════════════════════════════
function renderTable(scheduled) {
  const { tasks, evalStart, evalEnd, hols } = scheduled;
  let h = '';
  let prev = -1;
  tasks.forEach(t => {
    if (t.itemIdx !== prev) {
      h += `<tr class="irow"><td colspan="5">${esc(t.itemName)}${t.category?`<span class="badge" style="background:#F3F4F6;color:#6B7280;margin-left:8px">${esc(t.category)}</span>`:''}</td></tr>`;
      prev = t.itemIdx;
    }
    const biz = (t.startDate&&t.endDate) ? countBiz(t.startDate,t.endDate,hols) : '—';
    h += `<tr>
      <td style="padding-left:22px">${esc(t.phaseType)}${t.isBackground?' <em style="color:#9CA3AF;font-size:.8em">(BG)</em>':''}</td>
      <td>${esc(t.assignedPeople.join(', ')||'未割当')}</td>
      <td>${t.startDate?fmtJP(t.startDate):'—'}</td>
      <td>${t.endDate?fmtJP(t.endDate):'—'}</td>
      <td>${biz}</td>
    </tr>`;
  });
  h += `<tr class="erow">
    <td><strong>${esc(C.evalPhase.name)}</strong></td><td>—</td>
    <td>${fmtJP(evalStart)}</td><td>${fmtJP(evalEnd)}</td>
    <td>${countBiz(evalStart,evalEnd,hols)}</td>
  </tr>`;
  document.getElementById('tbody').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════════════
function render() {
  saveConfig();

  // Title
  const { value, unit } = C.evalPeriod;
  const unitLbl = { days:'日', weeks:'週', months:'ヶ月' }[unit];
  document.getElementById('pv-title').textContent = C.projectName || '(プロジェクト名)';
  document.getElementById('pv-sub').textContent   =
    `開発アイテム別パイプライン ガントチャート — ${C.startDate} → ${C.releaseDate}（評価期間 ${value}${unitLbl}）`;

  let scheduled;
  try {
    scheduled = runSchedule();
  } catch(e) {
    document.getElementById('warn-box').innerHTML = `<div class="warn-box">❌ スケジューリングエラー: ${esc(e.message)}</div>`;
    return;
  }

  // Warnings
  const wb = document.getElementById('warn-box');
  wb.innerHTML = scheduled.warnings.length
    ? `<div class="warn-box">⚠ ${scheduled.warnings.map(w=>`• ${esc(w)}`).join('<br>')}</div>`
    : '';

  renderGantt(scheduled);
  renderTable(scheduled);
}

// ═══════════════════════════════════════════════════════════
function getOpenSet(el) {
  const s = new Set();
  el.querySelectorAll('.li-wrap').forEach((w, i) => { if (w.querySelector('.li-body.open')) s.add(i); });
  return s;
}
function restoreOpenSet(el, s) {
  el.querySelectorAll('.li-wrap').forEach((w, i) => { if (s.has(i)) w.querySelector('.li-body')?.classList.add('open'); });
}

        <div class="fg"><label>担当可能工程</label>
          <div class="person-checks">
            ${phaseNames.map(pn=>`<label class="radio-item" style="font-size:.8rem">
              <input type="checkbox" data-pi="${i}" data-ph="${esc(pn)}" ${p.phases.includes(pn)?'checked':''}> ${esc(pn)}
            </label>`).join('')}
          </div>
        </div>
        <div class="fr">
          <div class="fg"><label>参画開始日</label><input type="date" value="${p.availableFrom||''}" data-pi="${i}" data-pf="availableFrom"></div>
          <div class="fg"><label>稼働率</label>
            <select data-pi="${i}" data-pf="utilization">
              ${[0.5,0.6,0.7,0.8,0.9,1.0].map(v=>`<option value="${v}" ${p.utilization==v?'selected':''}>${Math.round(v*100)}%</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="fg"><label>備考</label><input type="text" value="${esc(p.note||'')}" data-pi="${i}" data-pf="note"></div>
      </div>
    </div>
  `).join('');

  restoreOpenSet(el, openSet);

  el.querySelectorAll('[data-pf]').forEach(inp => inp.addEventListener('change', e => {
    const i=parseInt(e.target.dataset.pi), f=e.target.dataset.pf;
    let v = e.target.value;
    if (f==='utilization') v = parseFloat(v);
    if (f==='availableFrom') v = v||null;
    C.people[i][f] = v;
    render();
    // 名前変更時のみアイテム側の allowedPeople 表示を更新
    if (f === 'name') { renderPeopleList(); renderItemsList(); }
  }));
  el.querySelectorAll('[data-ph]').forEach(cb => cb.addEventListener('change', e => {
    const i=parseInt(e.target.dataset.pi), ph=e.target.dataset.ph;
    if (e.target.checked) { if(!C.people[i].phases.includes(ph)) C.people[i].phases.push(ph); }
    else C.people[i].phases = C.people[i].phases.filter(x=>x!==ph);
    render();
  }));
  el.querySelectorAll('[data-del-person]').forEach(btn => btn.addEventListener('click', e => {
    C.people.splice(parseInt(e.target.dataset.delPerson),1);
    render(); renderPeopleList(); renderItemsList();
  }));
}

document.getElementById('btn-add-person').addEventListener('click', () => {
  C.people.push({ name:'新規担当者', team:'', phases:[], availableFrom:null, utilization:1.0, note:'' });
  render(); renderPeopleList();
});

// ═══════════════════════════════════════════════════════════
//  EDITOR — ITEMS
// ═══════════════════════════════════════════════════════════
function renderItemsList() {
  const pns = C.phaseTypes.map(pt => pt.name);
  const ppl = C.people.map(p => p.name);
  const el = document.getElementById('items-list');
  const openSet = getOpenSet(el);
  el.innerHTML = C.items.map((item, iIdx) => `
    <div class="li-wrap">
      <div class="li-head" onclick="toggleLI(this)">
        <span class="li-name">${esc(item.name)}</span>
        <span class="li-sub">${esc(item.category)}</span>
        <button class="btn btn-danger" data-del-item="${iIdx}" onclick="event.stopPropagation()">削除</button>
      </div>
      <div class="li-body">
        <div class="fr">
          <div class="fg"><label>アイテム名</label><input type="text" value="${esc(item.name)}" data-ii="${iIdx}" data-if="name"></div>
          <div class="fg"><label>カテゴリ</label><input type="text" value="${esc(item.category)}" data-ii="${iIdx}" data-if="category"></div>
        </div>
        <div class="fg"><label>メモ</label><input type="text" value="${esc(item.note||'')}" data-ii="${iIdx}" data-if="note"></div>
        <div class="sec-title" style="margin-top:10px">
          <span>フェーズ</span>
          <button class="btn btn-secondary btn-sm" data-add-phase="${iIdx}">＋ フェーズ</button>
        </div>
        <div id="phases-${iIdx}">
          ${item.phases.map((ph,pIdx) => phaseForm(iIdx,pIdx,ph,pns,ppl)).join('')}
        </div>
      </div>
    </div>
  `).join('');

  restoreOpenSet(el, openSet);

  // Item field events
  el.querySelectorAll('[data-if]').forEach(inp => inp.addEventListener('input', e => {
    C.items[parseInt(e.target.dataset.ii)][e.target.dataset.if] = e.target.value; render();
  }));
  el.querySelectorAll('[data-del-item]').forEach(btn => btn.addEventListener('click', e => {
    C.items.splice(parseInt(e.target.dataset.delItem),1); render(); renderItemsList();
  }));
  el.querySelectorAll('[data-add-phase]').forEach(btn => btn.addEventListener('click', e => {
    const iIdx = parseInt(e.target.dataset.addPhase);
    C.items[iIdx].phases.push({ type: pns[0]||'', days:5 });
    render(); renderItemsList();
  }));

  wirePhaseEvents(el);
}

function phaseForm(iIdx, pIdx, ph, pns, ppl) {
  const typeOpts = pns.map(n=>`<option value="${esc(n)}" ${ph.type===n?'selected':''}>${esc(n)}</option>`).join('');
  const pplChecks = ppl.map(name=>`
    <label class="radio-item" style="font-size:.78rem">
      <input type="checkbox" data-pp-p="${esc(name)}" data-pi="${iIdx}" data-pj="${pIdx}"
        ${(ph.allowedPeople||[]).includes(name)?'checked':''}> ${esc(name)}
    </label>`).join('');
  const hasFixed = ph.fixedStart !== undefined && ph.fixedStart !== null;
  return `
    <div class="phase-wrap">
      <div class="phase-head">
        <select data-pf="type" data-pi="${iIdx}" data-pj="${pIdx}" style="flex:1;padding:6px 8px;border:1px solid #D1D5DB;border-radius:5px;font-size:.82rem">${typeOpts}</select>
        <input type="number" min="1" value="${ph.days}" data-pf="days" data-pi="${iIdx}" data-pj="${pIdx}"
          style="width:65px;padding:6px 8px;border:1px solid #D1D5DB;border-radius:5px;font-size:.82rem" title="工数（営業日）">
        <span style="font-size:.75rem;color:#9CA3AF">日</span>
        <button class="btn btn-danger" data-del-ph-i="${iIdx}" data-del-ph-j="${pIdx}">×</button>
      </div>
      <div style="margin-bottom:7px">
        <div class="fg-label">許可担当者 <span style="color:#9CA3AF;font-weight:400;text-transform:none">（未選択 = 自動割当）</span></div>
        <div class="person-checks">${pplChecks||'<span style="font-size:.78rem;color:#9CA3AF">担当者を先に追加してください</span>'}</div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px">
        <label class="chk-item" style="font-size:.8rem"><input type="checkbox" data-pf="requireAll" data-pi="${iIdx}" data-pj="${pIdx}" ${ph.requireAll?'checked':''}> 全員同時着手</label>
        <label class="chk-item" style="font-size:.8rem"><input type="checkbox" data-pf="background" data-pi="${iIdx}" data-pj="${pIdx}" ${ph.background?'checked':''}> バックグラウンド</label>
      </div>
      ${hasFixed
        ? `<div class="fg" style="margin-bottom:0"><label>固定開始日</label><input type="date" value="${ph.fixedStart}" data-pf="fixedStart" data-pi="${iIdx}" data-pj="${pIdx}"></div>`
        : `<button class="btn btn-secondary btn-sm" style="font-size:.73rem" data-add-fixed="${iIdx}-${pIdx}">＋ 固定開始日を設定</button>`
      }
    </div>`;
}

function wirePhaseEvents(el) {
  // Phase field changes
  el.querySelectorAll('[data-pf]').forEach(inp => {
    const ev = (inp.type==='checkbox'||inp.tagName==='SELECT') ? 'change' : 'input';
    inp.addEventListener(ev, e => {
      const ii=parseInt(e.target.dataset.pi), pj=parseInt(e.target.dataset.pj), f=e.target.dataset.pf;
      const ph = C.items[ii].phases[pj];
      if (inp.type==='checkbox') ph[f] = inp.checked;
      else if (f==='days') ph[f] = parseInt(inp.value)||1;
      else ph[f] = inp.value||null;
      render();
      if (f==='type') renderItemsList();
    });
  });
  // Allowed people checkboxes
  el.querySelectorAll('[data-pp-p]').forEach(cb => cb.addEventListener('change', e => {
    const ii=parseInt(e.target.dataset.pi), pj=parseInt(e.target.dataset.pj), name=e.target.dataset.ppP;
    const ph = C.items[ii].phases[pj];
    if (!ph.allowedPeople) ph.allowedPeople = [];
    if (e.target.checked) { if(!ph.allowedPeople.includes(name)) ph.allowedPeople.push(name); }
    else {
      ph.allowedPeople = ph.allowedPeople.filter(n=>n!==name);
      if (ph.allowedPeople.length===0) delete ph.allowedPeople;
    }
    render();
  }));
  // Phase delete
  el.querySelectorAll('[data-del-ph-i]').forEach(btn => btn.addEventListener('click', e => {
    C.items[parseInt(e.target.dataset.delPhI)].phases.splice(parseInt(e.target.dataset.delPhJ),1);
    render(); renderItemsList();
  }));
  // Add fixed start
  el.querySelectorAll('[data-add-fixed]').forEach(btn => btn.addEventListener('click', e => {
    const [ii,pj] = e.target.dataset.addFixed.split('-').map(Number);
    C.items[ii].phases[pj].fixedStart = C.startDate;
    render(); renderItemsList();
  }));
}

function toggleLI(header) { header.nextElementSibling.classList.toggle('open'); }

document.getElementById('btn-add-item').addEventListener('click', () => {
  C.items.push({ name:'新規アイテム', category:'', note:'', phases:[{ type: C.phaseTypes[0]?.name||'', days:5 }] });
  render(); renderItemsList();
});

document.getElementById('btn-json-save').addEventListener('click', () => {

document.getElementById('f-json-load').addEventListener('change', e => {

  r.onload = ev => {
    try { C = JSON.parse(ev.target.result); initAll(); render(); }

});

// ── PNG エクスポート ──
document.getElementById('btn-png').addEventListener('click', async () => {
  const btn = document.getElementById('btn-png');
  btn.textContent = '生成中…'; btn.disabled = true;
  try {
    if (!window.html2canvas) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    const canvas = await window.html2canvas(document.getElementById('export-area'), { scale:2, useCORS:true, backgroundColor:'#ffffff' });
    canvas.toBlob(blob => dl(blob, `${C.projectName||'gantt'}.png`, 'image/png'), 'image/png');
    btn.textContent = 'PNG 出力'; btn.disabled = false;
  } catch(e) {
    alert('PNG出力に失敗しました: '+e.message);
    btn.textContent = 'PNG 出力'; btn.disabled = false;
  }
});

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc2(s) { return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trunc(s,n) { return s.length>n ? s.slice(0,n-1)+'…' : s; }
function dl(data, name, type) {
  const url = data instanceof Blob ? URL.createObjectURL(data) : URL.createObjectURL(new Blob([data],{type}));
  const a = document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}
function loadScript(src) {
  return new Promise((res,rej) => { const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
}
